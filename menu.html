<!DOCTYPE html>
<html>
<head>
  <title>Menu</title>
</head>
<body>

  <h1>รายการอาหาร</h1>

  <div id="menu"></div>

<!-- ช่องกรอกข้อมูล -->
<input id="nameInput" type="text" placeholder="ชื่อเมนู">
<input id="priceInput" type="number" placeholder="ราคา">
<input id="categoryInput" type="text" placeholder="ประเภทอาหาร">
<button onclick="addMenu()">
  เพิ่มเมนู
</button>

  <script>
    let menuItems = [
  {
    name: "ข้าวผัดกุ้ง",
    price: 89,
    category: "ของคาว"
  },
  {
    name: "บิงซู",
    price: 129,
    category: "ของหวาน"
  },
  {
    name: "ชาไทย",
    price: 45,
    category: "เครื่องดื่ม"
  }
]

    let menuDiv = document.getElementById("menu")

    for (let item of menuItems) {
      menuDiv.innerHTML += `
        <p>
          ${item.name} - ${item.price} บาท (${item.category})
        </p>
      `
    }
    function addMenu() {
  let newMenu = {
    name: document.getElementById("nameInput").value,
    price: Number(document.getElementById("priceInput").value),
    category: document.getElementById("categoryInput").value
  }

  menuItems.push(newMenu)

  menuDiv.innerHTML += `
    <p>
      ${newMenu.name} - ${newMenu.price} บาท (${newMenu.category})
    </p>
  `
}
  </script>

</body>
</html>
