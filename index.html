<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let menuItems = [
  {
    name: "ข้าวผัดกุ้ง",
    price: 89,
    category: "ของคาว"
  },
  {
    name: "บิงซู",
    price: 129,
    category: "ของหวาน"
  },
  {
    name: "ชาไทย",
    price: 45,
    category: "เครื่องดื่ม"
  }
]

function showMenu() {
  for (let item of menuItems) {
    console.log(item.name + " - " + item.price + " บาท")
  }
}

function calculateTotal() {
  let total = 0

  for (let item of menuItems) {
    total = total + item.price
  }

  console.log("ราคารวมทั้งหมด: " + total + " บาท")
}

showMenu()
calculateTotal()
</script>
    
</body>
</html>
