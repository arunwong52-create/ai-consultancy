<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restaurant Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🍜 Restaurant Finder</h1>

  <!-- 🔍 Search Bar (เพิ่มใหม่) -->
  <input 
    type="text" 
    id="search-input" 
    placeholder="ค้นหาร้านอาหาร..."
  />

  <!-- 🔘 Filter Buttons -->
  <div class="filters">
    <button id="all-btn">ทั้งหมด</button>
    <button id="open-btn">เปิดอยู่</button>
    <button id="closed-btn">ปิดแล้ว</button>
    <button id="rating-btn">คะแนน 4.5+</button>
  </div>

  <!-- 📦 Container -->
  <div id="card-container"></div>

  <script src="script.js"></script>
</body>
</html>
