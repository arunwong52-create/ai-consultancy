<!DOCTYPE html>
<html>
  <head>
    <title>AI Chatbot ร้านอาหาร</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #f0f4f8;
        font-family: 'Sarabun', sans-serif;
        text-align: center;
      }
      h1 { color: #2c3e50; margin-top: 40px; }
      #chat-box {
        width: 500px;
        margin: 20px auto;
        background: white;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
        min-height: 300px;
        text-align: left;
      }
      #input-area {
        width: 500px;
        margin: 10px auto;
        display: flex;
        gap: 10px;
      }
      #user-input {
        flex: 1;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-family: 'Sarabun', sans-serif;
        font-size: 16px;
      }
      button {
        padding: 10px 20px;
        background-color: #27ae60;
        color: white;
        border: none;
        border-radius: 8px;
        font-family: 'Sarabun', sans-serif;
        font-size: 16px;
        cursor: pointer;
      }
      .message {
        margin: 10px 0;
        padding: 10px;
        border-radius: 8px;
      }
      .user { background-color: #e8f5e9; text-align: right; }
      .ai { background-color: #f0f4f8; }
    </style>
  </head>
  <body>
    <h1>🤖 AI Assistant ร้านอาหารของพอร์</h1>
    <div id="chat-box">
      <div class="message ai">สวัสดีครับ! ผมคือ AI Assistant ของร้าน ถามเรื่องเมนูได้เลยครับ 😊</div>
    </div>
    <div id="input-area">
      <input id="user-input" type="text" placeholder="พิมพ์คำถามที่นี่...">
      <button onclick="sendMessage()">ส่ง</button>
    </div>

    <script>
      async function sendMessage() {
        let userText = document.getElementById("user-input").value;
        if (!userText) return;

        addMessage(userText, "user");
        document.getElementById("user-input").value = "";
        addMessage("กำลังคิด...", "ai");

        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: "คุณคือ AI Assistant ของร้านอาหารไทยของพอร์ เมนูมี: ผัดไทย 80 บาท, ต้มยำกุ้ง 120 บาท, ข้าวผัดกะเพรา 60 บาท ตอบเป็นภาษาไทยสั้นๆ และเป็นมิตร",
            messages: [{ role: "user", content: userText }]
          })
        });

        const data = await response.json();
        const aiText = data.content[0].text;

        let chatBox = document.getElementById("chat-box");
        chatBox.lastChild.remove();
        addMessage(aiText, "ai");
      }

      function addMessage(text, sender) {
        let chatBox = document.getElementById("chat-box");
        let div = document.createElement("div");
        div.className = "message " + sender;
        div.innerText = text;
        chatBox.appendChild(div);
      }
    </script>
  </body>
</html>
